version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: reaxone_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: reaxone
      POSTGRES_PASSWORD: reaxone_dev
      POSTGRES_DB: reaxone
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: reaxone_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@reaxone.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres

volumes:
  postgres_data:
